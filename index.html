<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Post</title>
</head>
<body>
    <form class="myForm" id="myForm">
        <input type="text" name="username" id="username-input" placeholder="Enter you name ...">
        <input type="number" name="age" id="age-input" placeholder="Enter your age ...">
        <br>
        <label>Upload File : </label>
        <input type="file" name="file">
        <br>
        <button type="submit">Send</button>
    </form>

    <script>
        document.getElementById('myForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            // What happens is that whenever we click on submit button, the whole page refreshes and we don't want that that's why we use preventDefault()

            const formData = new FormData(e.target);
            // Formdata is a built in wrapper that extracts all the data from the form fields.
            // e.target is the form itself.
            // so for now the formData contains the username and age

            const data = Object.fromEntries(formData.entries());
            // The formData is not a javascript object, so we are turning it into one

            const res = await fetch('http://127.0.0.1:8000/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            console.log('Sent : ', await res.json())
        })
    </script>
</body>
</html>
